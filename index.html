<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>KISMET — Discover Your Destiny</title>
    <!-- Load Telegram SDK only if not already available (for browser testing) -->
    <script>
      // Check if we're in Telegram Mini App (mobile automatically injects SDK)
      const isInTelegram = !!(window.Telegram && window.Telegram.WebApp);
      
      if (!isInTelegram) {
        // Only load script if not in Telegram (for browser testing)
        const script = document.createElement('script');
        script.src = 'https://telegram.org/js/telegram-web-app.js';
        script.async = true;
        document.head.appendChild(script);
      }
      
      // Debug: Check Telegram SDK availability
      window.addEventListener('load', function() {
        setTimeout(() => {
          console.log('HTML: Telegram script loaded?', !!(window.Telegram && window.Telegram.WebApp));
          console.log('HTML: window.Telegram:', window.Telegram);
          if (window.Telegram && window.Telegram.WebApp) {
            const webApp = window.Telegram.WebApp;
            console.log('HTML: WebApp methods:', Object.keys(webApp));
            console.log('HTML: openInvoice exists?', typeof webApp.openInvoice === 'function');
            console.log('HTML: initData exists?', !!webApp.initData);
            console.log('HTML: version:', webApp.version);
            console.log('HTML: platform:', webApp.platform);
          }
        }, 500);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
